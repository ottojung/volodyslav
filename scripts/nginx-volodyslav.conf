# Nginx reverse-proxy configuration for Volodyslav
#
# Place this snippet inside an existing server{} block (or use it as a
# starting point for a new one).  Replace the placeholder values:
#
#   YOUR_DOMAIN_HERE   – the public hostname, e.g. example.com
#   VOLODYSLAV_PORT    – the value of $VOLODYSLAV_SERVER_PORT (default 3000)
#   /volodyslav        – the base path set via $VOLODYSLAV_BASEURL
#
# The most important directive here is `proxy_request_buffering off` on the
# push-pcm location.  Without it nginx writes incoming multipart PCM bodies
# to a temporary file under client_body_temp_path before forwarding them to
# the backend.  If that directory is missing or unwritable the request fails
# with a 500 error, causing PCM fragments to be silently dropped and live
# diary questions to be generated far less frequently than expected.
#
# Usage (include from your main nginx.conf or a sites-available file):
#
#   include /path/to/nginx-volodyslav.conf;

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN_HERE;

    # --- TLS (fill in your certificate paths) ---
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;

    # --- Redirect HTTP → HTTPS ---
    # (put this in a separate server{} block listening on port 80)

    # -----------------------------------------------------------------------
    # push-pcm endpoint – disable request buffering so nginx never writes the
    # PCM body to a temp file.  Nginx streams the body directly to the Node
    # backend, which already uses in-process memory storage (multer memoryStorage).
    # Without this directive a missing/unwritable client_body_temp_path causes
    # a [crit] error and a 500 response for every chunk that exceeds
    # client_body_buffer_size.
    # -----------------------------------------------------------------------
    location ~ ^/volodyslav/api/audio-recording-session/[^/]+/push-pcm$ {
        proxy_pass         http://127.0.0.1:VOLODYSLAV_PORT;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # KEY FIX: do not buffer the request body to disk.
        # Streams the multipart upload directly to the Node process.
        proxy_request_buffering off;
    }

    # -----------------------------------------------------------------------
    # All other Volodyslav API and static-asset paths
    # -----------------------------------------------------------------------
    location /volodyslav/ {
        proxy_pass         http://127.0.0.1:VOLODYSLAV_PORT;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Needed for PWA / service-worker to work correctly behind a proxy.
        proxy_set_header   X-Forwarded-Prefix /volodyslav;
    }
}
