name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      (
        github.event.comment.author_association == 'OWNER'
      ) && (
        startsWith(github.event.comment.body, 'plsoc') ||
        startsWith(github.event.comment.body, 'plsocz') ||
        startsWith(github.event.comment.body, '/opencode-pro-zen') ||
        startsWith(github.event.comment.body, '/opencode')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Select model
        id: select-model
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          first_line="$(
            printf '%s\n' "$COMMENT_BODY" \
              | tr -d '\r' \
              | grep -m 1 -E '[^[:space:]]' \
              || true
          )"

          read -r command _ <<< "$first_line"

          case "$command" in
            /opencode-pro-zen)
              echo 'model=opencode/deepseek-v4-pro' >> "$GITHUB_OUTPUT"
              ;;

            plsocz)
              echo 'model=opencode/deepseek-v4-flash' >> "$GITHUB_OUTPUT"
              ;;

            /opencode-pro)
              echo 'model=opencode-go/deepseek-v4-pro' >> "$GITHUB_OUTPUT"
              ;;

            /opencode|plsoc)
              echo 'model=opencode-go/deepseek-v4-flash' >> "$GITHUB_OUTPUT"
              ;;

            *)
              echo "Unsupported opencode command: $command" >&2
              exit 1
              ;;
          esac

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: ${{ steps.select-model.outputs.model }}
          mentions: /opencode-pro-zen,/opencode-pro,/opencode,plsocz,plsoc
