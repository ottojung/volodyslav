name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      ) && (
        startsWith(github.event.comment.body, 'plsoc') ||
        startsWith(github.event.comment.body, '/opencode') ||
        startsWith(github.event.comment.body, '/opencode-pro')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Select model
        id: select-model
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if printf '%s' "$COMMENT_BODY" | grep -Eiq '(^|[[:space:]])/opencode-pro([[:space:]]|$)'; then
            echo 'model=opencode-go/deepseek-v4-pro' >> "$GITHUB_OUTPUT"
          else
            echo 'model=opencode-go/deepseek-v4-flash' >> "$GITHUB_OUTPUT"
          fi

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: ${{ steps.select-model.outputs.model }}
          mentions: /opencode-pro,/opencode,plsoc
