name: dependency-check

on:
    schedule:
        - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
    workflow_dispatch: # Allow manual runs

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js 23.x
              uses: actions/setup-node@v3
              with:
                  node-version: 23.x

            - name: Remove lockfile to force fresh dependency resolution
              run: rm -f package-lock.json

            - name: Install latest dependencies
              run: npm install

            - name: Build frontend
              run: npm run build

            - name: Run tests
              run: TZ=Asia/Tokyo npm run test-only

    open-issue-on-failure:
        runs-on: ubuntu-latest
        needs: build-and-test
        if: failure()
        permissions:
            issues: write
        steps:
            - name: Create issue on failure
              uses: actions/github-script@v7
              with:
                  script: |
                      const title = "Dependency check failed – weekly build broken";
                      const body = [
                          "The weekly dependency check workflow failed.",
                          "",
                          `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                          "",
                          "One or more updated dependencies may have introduced a breaking change.",
                          "Please investigate and pin or update the affected package(s).",
                      ].join("\n");

                      // Avoid duplicate open issues for the same failure
                      const { data: existing } = await github.rest.issues.listForRepo({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          state: "open",
                          labels: "dependency-check",
                      });

                      if (existing.length === 0) {
                          await github.rest.issues.create({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              title,
                              body,
                              labels: ["dependency-check"],
                          });
                      }
